<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>技术支持 · 故障排查向导</title>
<style>
  :root {
    --ink:#1a2230; --ink-soft:#4a5568; --line:#e2e6ec; --bg:#f6f8fa; --card:#fff;
    --brand:#1f6feb; --brand-dark:#1a5fd0; --brand-tint:#eaf2ff;
    --ok:#16a34a; --warn:#d97706; --stop:#dc2626;
    --radius:12px; --shadow:0 1px 3px rgba(20,30,50,.06),0 6px 20px rgba(20,30,50,.05);
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
    line-height:1.55; -webkit-font-smoothing:antialiased; }
  .wrap { max-width:820px; margin:0 auto; padding:24px 20px 80px; }
  header.top { border-bottom:1px solid var(--line); background:#fff; }
  .top-inner { max-width:820px; margin:0 auto; padding:16px 20px; display:flex; align-items:center; gap:12px; }
  .logo { font-weight:700; font-size:17px; letter-spacing:.2px; }
  .logo .dot { color:var(--brand); }
  .top-tag { margin-left:auto; font-size:12px; color:var(--ink-soft); background:var(--brand-tint); padding:4px 10px; border-radius:20px; }
  .crumbs { display:flex; flex-wrap:wrap; align-items:center; gap:6px; font-size:13px; color:var(--ink-soft); margin:20px 0 18px; }
  .crumbs button { border:none; background:none; color:var(--brand); cursor:pointer; font-size:13px; padding:2px 4px; border-radius:6px; font-family:inherit; }
  .crumbs button:hover { background:var(--brand-tint); }
  .crumbs .sep { color:#b6bfcc; }
  .eyebrow { font-size:12px; letter-spacing:1.5px; text-transform:uppercase; color:var(--brand); font-weight:700; }
  h1.q { font-size:22px; margin:6px 0 4px; line-height:1.3; }
  .sub { color:var(--ink-soft); font-size:14px; margin-bottom:20px; }
  .search { position:relative; margin-bottom:22px; }
  .search input { width:100%; padding:13px 14px 13px 42px; font-size:15px; border:1px solid var(--line); border-radius:var(--radius); background:#fff; font-family:inherit; color:var(--ink); }
  .search input:focus { outline:2px solid var(--brand); border-color:var(--brand); }
  .search svg { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:#9aa5b4; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:12px; }
  .choice { text-align:left; background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:16px; cursor:pointer; font-family:inherit; transition:.14s; display:flex; gap:12px; align-items:flex-start; box-shadow:var(--shadow); }
  .choice:hover { border-color:var(--brand); transform:translateY(-1px); }
  .choice:focus-visible { outline:2px solid var(--brand); outline-offset:2px; }
  .choice .ico { font-size:22px; line-height:1; flex-shrink:0; margin-top:1px; }
  .choice .body { min-width:0; }
  .choice .name { font-weight:650; font-size:15px; }
  .choice .desc { font-size:12.5px; color:var(--ink-soft); margin-top:3px; }
  .choice.soon { opacity:.55; cursor:default; }
  .choice.soon:hover { border-color:var(--line); transform:none; }
  .badge-soon { font-size:10px; background:#eef1f5; color:#8794a5; padding:2px 7px; border-radius:10px; margin-left:6px; vertical-align:middle; }
  .badge-feat { font-size:10px; background:#eaf2ff; color:#1f6feb; padding:2px 7px; border-radius:10px; margin-left:6px; vertical-align:middle; }
  .swatch { width:30px; height:30px; border-radius:8px; flex-shrink:0; margin-top:1px; box-shadow:inset 0 0 0 1px rgba(0,0,0,.08); }
  .panel { background:#fff; border:1px solid var(--line); border-radius:var(--radius); padding:22px; box-shadow:var(--shadow); border-left:4px solid var(--brand); }
  .panel.ok { border-left-color:var(--ok); } .panel.warn { border-left-color:var(--warn); } .panel.stop { border-left-color:var(--stop); }
  .panel .tag { display:inline-block; font-size:11px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; padding:3px 9px; border-radius:20px; margin-bottom:12px; }
  .tag.cause { background:var(--brand-tint); color:var(--brand-dark); }
  .tag.ok { background:#e7f6ec; color:var(--ok); } .tag.warn { background:#fdf0dc; color:var(--warn); } .tag.stop { background:#fdeaea; color:var(--stop); }
  .panel h2 { font-size:18px; margin:0 0 10px; }
  .panel p { margin:0 0 12px; font-size:14.5px; color:#33404f; }
  .steps { margin:0 0 14px; padding-left:0; list-style:none; counter-reset:s; }
  .steps li { position:relative; padding:6px 0 6px 34px; font-size:14.5px; border-bottom:1px dashed var(--line); }
  .steps li:last-child { border-bottom:none; }
  .steps li::before { counter-increment:s; content:counter(s); position:absolute; left:0; top:6px; width:22px; height:22px; background:var(--brand); color:#fff; border-radius:50%; font-size:12px; font-weight:700; display:grid; place-items:center; }
  .note { background:#fbfcfe; border:1px solid var(--line); border-radius:8px; padding:10px 12px; font-size:13px; color:var(--ink-soft); }
  .note b { color:var(--ink); }
  .followup { margin-top:18px; padding-top:16px; border-top:1px solid var(--line); }
  .followup .fq { font-weight:650; font-size:15px; margin-bottom:10px; }
  .yn { display:flex; gap:10px; flex-wrap:wrap; }
  .yn button { flex:1; min-width:130px; padding:11px; border:1px solid var(--line); background:#fff; border-radius:10px; cursor:pointer; font-family:inherit; font-size:14px; font-weight:600; color:var(--ink); transition:.14s; }
  .yn button:hover { border-color:var(--brand); background:var(--brand-tint); }
  .stuck { margin-top:22px; background:linear-gradient(180deg,#fff,#f9fbff); border:1px solid var(--line); border-radius:var(--radius); padding:18px 20px; }
  .stuck h3 { margin:0 0 4px; font-size:15px; }
  .stuck p { margin:0 0 14px; font-size:13px; color:var(--ink-soft); }
  .stuck-actions { display:flex; gap:10px; flex-wrap:wrap; }
  .btn { padding:10px 16px; border-radius:9px; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; border:1px solid var(--brand); }
  .btn.primary { background:var(--brand); color:#fff; } .btn.primary:hover { background:var(--brand-dark); }
  .btn.ghost { background:#fff; color:var(--brand); } .btn.ghost:hover { background:var(--brand-tint); }
  .back-link { margin-top:20px; } .back-link button { background:none; border:none; color:var(--ink-soft); cursor:pointer; font-size:13px; font-family:inherit; padding:4px; }
  .back-link button:hover { color:var(--brand); }
  .ref { margin-top:30px; border-top:1px solid var(--line); padding-top:18px; }
  .ref summary { cursor:pointer; font-weight:650; font-size:14px; color:var(--ink); }
  .ref table { width:100%; border-collapse:collapse; margin-top:12px; font-size:13px; }
  .ref th,.ref td { text-align:left; padding:8px 10px; border-bottom:1px solid var(--line); vertical-align:top; }
  .ref th { background:#f2f5f8; font-weight:600; }
  .ref td:first-child { font-weight:600; white-space:nowrap; }
  .fade { animation:fade .25s ease; }
  @keyframes fade { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }
  @media (prefers-reduced-motion:reduce) { .fade { animation:none; } }
  .loading { color:var(--ink-soft); font-size:14px; padding:40px 0; text-align:center; }
</style>
</head>
<body>
<header class="top">
  <div class="top-inner">
    <span class="logo">技术支持中心<span class="dot">.</span></span>
    <span class="top-tag">故障排查向导</span>
  </div>
</header>
<div class="wrap">
  <nav class="crumbs" id="crumbs"></nav>
  <div id="app"><div class="loading">加载中…</div></div>
  <div class="back-link" id="backLink"></div>
</div>

let DATA, NODES, REF_TABLES;

async function boot() {
  try {
    const res = await fetch('troubleshooter-data.json', { cache: 'no-store' });
    if (!res.ok) throw new Error('http ' + res.status);
    const json = await res.json();
    apply(json);
  } catch (e) {
    apply(FALLBACK_DATA); // 本地打开时回退
  }
  render();
}
function apply(json){ DATA = { brands: json.brands }; NODES = json.nodes; REF_TABLES = json.ref_tables; }

/* ---- 状态 ---- */
let state = { brand:null, product:null, symptom:null, node:null };
const app = document.getElementById('app');
const crumbsEl = document.getElementById('crumbs');
const backLinkEl = document.getElementById('backLink');

function reset(){ state={brand:null,product:null,symptom:null,node:null}; render(); }
function findBrand(id){ return DATA.brands.find(b=>b.id===id); }

function render(){
  renderCrumbs();
  if(!state.brand) return renderBrands();
  if(!state.product) return renderProducts();
  if(!state.symptom) return renderSymptoms();
  return renderNode(state.node);
}
function renderCrumbs(){
  const p=[]; p.push(`<button onclick="reset()">技术支持</button>`);
  if(state.brand) p.push(`<span class="sep">›</span><button onclick="toBrand()">${state.brand.name}</button>`);
  if(state.product) p.push(`<span class="sep">›</span><button onclick="toProduct()">${state.product.name}</button>`);
  if(state.symptom) p.push(`<span class="sep">›</span><button onclick="toSymptom()">${state.symptom.name}</button>`);
  crumbsEl.innerHTML=p.join(" ");
  backLinkEl.innerHTML = state.brand ? `<button onclick="stepBack()">← 返回上一步</button>` : "";
}
function toBrand(){ state.product=null; state.symptom=null; state.node=null; render(); }
function toProduct(){ state.symptom=null; state.node=null; render(); }
function toSymptom(){ state.node=state.symptom.start; render(); }
function stepBack(){ if(state.symptom) toProduct(); else if(state.product) toBrand(); else if(state.brand) reset(); }

function renderBrands(){
  app.className='fade';
  app.innerHTML=`
    <div><div class="eyebrow">故障排查 · 第 1 步</div>
    <h1 class="q">先选择设备品牌</h1>
    <div class="sub">找到你正在使用的设备,我们一步步帮你定位问题。</div></div>
    ${searchBox()}
    <div class="grid">
      ${DATA.brands.map(b=> b.comingSoon ? cardSoon(b) :
        `<button class="choice" onclick="pickBrand('${b.id}')"><span class="ico">${b.icon}</span>
         <span class="body"><span class="name">${b.name}</span><span class="desc">${b.desc}</span></span></button>`).join("")}
      ${cardSoon({icon:"➕",name:"更多品牌",desc:"框架可扩展,持续录入"})}
    </div>`;
}
function renderProducts(){
  app.className='fade'; const b=state.brand;
  app.innerHTML=`
    <div><div class="eyebrow">${b.name} · 第 2 步</div>
    <h1 class="q">选择产品型号</h1>
    <div class="sub">不同型号的排查方式不同,请选择你的机型。</div></div>
    <div class="grid">
      ${b.products.map(p=>`<button class="choice" onclick="pickProduct('${p.id}')"><span class="ico">${p.icon}</span>
        <span class="body"><span class="name">${p.name}</span><span class="desc">${p.desc}</span></span></button>`).join("")}
      ${cardSoon({icon:"➕",name:"更多型号",desc:"框架可扩展,持续录入"})}
    </div>`;
}
function renderSymptoms(){
  app.className='fade'; const p=state.product;
  app.innerHTML=`
    <div><div class="eyebrow">${p.name} · 第 3 步</div>
    <h1 class="q">你遇到的是哪种情况?</h1>
    <div class="sub">选择最接近的症状,进入分步排查。</div></div>
    ${searchBox()}
    <div class="grid">
      ${p.symptoms.map(s=>`<button class="choice" onclick="pickSymptom('${s.id}')"><span class="ico">${s.icon}</span>
        <span class="body"><span class="name">${s.name}${s.featured?'<span class="badge-feat">推荐入口</span>':''}</span></span></button>`).join("")}
    </div>
    ${refTable(p.id)}`;
}
function renderNode(id){
  const n=NODES[id]; app.className='fade';
  if(!n){ app.innerHTML="<p>节点缺失</p>"; return; }
  if(n.type==="branch"){
    app.innerHTML=`<div class="panel"><span class="tag cause">${n.tag}</span>
      <h2>${n.q}</h2><p>${n.body}</p>
      <div class="yn"><button onclick="goNode('${n.yes}')">是 ✓</button>
      <button onclick="goNode('${n.no}')">否 / 不确定</button></div></div>`;
    return;
  }
  if(n.type==="ringpicker"){
    app.innerHTML=`
      <div><div class="eyebrow">${state.product.name} · 状态诊断</div>
      <h1 class="q">${n.q}</h1><div class="sub">${n.body}</div></div>
      <div class="grid">
        ${n.options.map(o=>`<button class="choice" onclick="goNode('${o.to}')">
          <span class="swatch" style="background:${o.color}"></span>
          <span class="body"><span class="name">${o.label}</span></span></button>`).join("")}
      </div>`;
    return;
  }
  const lvl=n.level==="ok"?"ok":n.level==="warn"?"warn":n.level==="stop"?"stop":"";
  const tc=n.level==="ok"?"ok":n.level==="warn"?"warn":n.level==="stop"?"stop":"cause";
  app.innerHTML=`
    <div class="panel ${lvl}"><span class="tag ${tc}">${n.tag}</span>
      <h2>${n.title}</h2><p>${n.intro}</p>
      <ol class="steps">${n.steps.map(s=>`<li>${s}</li>`).join("")}</ol>
      ${n.note?`<div class="note"><b>说明:</b> ${n.note}</div>`:""}
      ${n.followup?`<div class="followup"><div class="fq">${n.followup.q}</div>
        <div class="yn"><button onclick="goNode('${n.followup.yes}')">是 ✓</button>
        <button onclick="goNode('${n.followup.no}')">否</button></div></div>`:""}
    </div>
    ${stuckBox()}`;
}
function searchBox(){
  return `<div class="search">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    <input placeholder="或直接搜索关键词,如 “灯不亮”、“error 1”、“光环红色”…（原型未接搜索）"></div>`;
}
function cardSoon(x){
  return `<div class="choice soon"><span class="ico">${x.icon||'🔒'}</span>
    <span class="body"><span class="name">${x.name}<span class="badge-soon">待录入</span></span><span class="desc">${x.desc||''}</span></span></div>`;
}
function stuckBox(){
  const ctx = `${state.brand?.name} / ${state.product?.name} / ${state.symptom?.name}`;
  return `<div class="stuck"><h3>问题还没解决?</h3>
    <p>把设备型号和现象发给我们的工程师,通常当天回复。也可以顺带询价易损件与配件。</p>
    <div class="stuck-actions">
      <button class="btn primary" onclick="alert('接入工单/表单,自动带上下文:\\n${ctx}')">联系技术支持</button>
      <button class="btn ghost" onclick="alert('接入配件/耗材询价表单,自动带上下文:\\n${ctx}')">询价配件耗材</button>
    </div></div>`;
}
function refTable(pid){
  const t=REF_TABLES[pid]; if(!t) return "";
  return `<details class="ref"><summary>展开:${t.title}</summary>
    <table><thead><tr>${t.cols.map(c=>`<th>${c}</th>`).join("")}</tr></thead>
    <tbody>${t.rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join("")}</tr>`).join("")}</tbody></table></details>`;
}
function pickBrand(id){ state.brand=findBrand(id); render(); }
function pickProduct(id){ state.product=state.brand.products.find(p=>p.id===id); render(); }
function pickSymptom(id){ state.symptom=state.product.symptoms.find(s=>s.id===id); state.node=state.symptom.start; render(); }
function goNode(id){ state.node=id; render(); }

boot();
</script>
</body>
</html>
